<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendidikan SMP - Putu Ayu Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="app.css">
    
    <style>
        /* CSS agar layout halaman manis dan pas di tengah */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #f8f9fa; /* Warna dasar jika gradient app.css tidak load */
        }

        .content-card {
            background-color: #ffffff !important; /* Pakai !important agar tidak tertimpa */
            color: #333333;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            max-width: 650px;
            width: 90%;
            padding: 40px; /* Sesuaikan padding agar pas di HP */
            margin: 20px auto;
        }
        
        /* Tambahan agar gambar responsif tidak melebar merusak card */
        .content-card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="content-card text-center">
        <h2 class="fw-bold mb-4">Masa SMP</h2>
        
        <div class="mb-4">
            <img src="foto-osissmp.jpeg" alt="Foto Masa SMP">
        </div>

        <div class="text-start fs-5 lh-base mb-4">
            <p>Memasuki jenjang Sekolah Menengah Pertama...</p>
            <p>Selama masa SMP, saya aktif mengasah jiwa...</p>
            
            <hr class="my-4">
            
            <h5 class="fw-bold">Informasi Tambahan:</h5>
            <ul class="mt-2">
                <li><strong>Tahun Lulus:</strong> 2022</li>
                <li><strong>Ekstrakurikuler & Organisasi:</strong> Pramuka, OSIS</li>
            </ul>
        </div>

        <div class="mt-4">
            <div class="mb-4">
                <audio controls>
                    <source src="lagu_smp.mp3" type="audio/mpeg">
                    Browsermu tidak mendukung pemutar audio ini.
                </audio>
            </div>
            
            <a href="index.html" class="btn btn-secondary">
                &larr; Kembali ke Biodata
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
